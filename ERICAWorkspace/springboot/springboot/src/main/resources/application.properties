spring.application.name=springboot

# server
server.port=9085
server.address=127.0.0.1
server.servlet.context-path=/api

# logging
logging.level.com.backpro=DEBUG

# JSON: snake_case 변환 + LocalDateTime → ISO 문자열 (배열 아님)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.datatype.datetime.write-dates-as-timestamps=false
# DataSource (MySQL - Production team5)
spring.datasource.url=jdbc:mysql://101.79.16.88:3306/team5?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=team5
spring.datasource.password=JDzKgyMuUw0BZtm9dft5i3N6BguNHceG

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# JWT
jwt.secret=erica-backend-jwt-secret-key-must-be-at-least-256bits-long-32chars
jwt.expiration=86400000