spring.application.name=springboot

# server
server.port=8081
server.servlet.context-path=/api

# logging
logging.level.com.backpro=DEBUG

# JSON: snake_case 변환 + LocalDateTime → ISO 문자열 (배열 아님)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.datatype.datetime.write-dates-as-timestamps=false
# DataSource (MySQL - local ERICA)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ERICA?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=ERICAbackend
spring.datasource.password=ERICAbackend

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads